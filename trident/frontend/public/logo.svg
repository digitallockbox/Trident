<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs>
        <linearGradient id="trident-grad" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22d3ee"/>
            <stop offset="100%" stop-color="#0ea5e9"/>
        </linearGradient>
    </defs>
    <!-- Center prong -->
    <rect x="29" y="4" width="6" height="36" rx="3" fill="url(#trident-grad)"/>
    <!-- Left prong -->
    <rect x="14" y="12" width="6" height="22" rx="3" fill="url(#trident-grad)" transform="rotate(-12 17 12)"/>
    <!-- Right prong -->
    <rect x="44" y="12" width="6" height="22" rx="3" fill="url(#trident-grad)" transform="rotate(12 47 12)"/>
    <!-- Crossbar -->
    <rect x="12" y="32" width="40" height="5" rx="2.5" fill="url(#trident-grad)"/>
    <!-- Shaft -->
    <rect x="29" y="36" width="6" height="24" rx="3" fill="url(#trident-grad)"/>
</svg>
