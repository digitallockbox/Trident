name: Scheduled Maintenance
on:
  schedule:
    - cron: "0 3 * * *"
jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Backups
        run: ./scripts/server-init.sh backup
      - name: Cleanup
        run: ./scripts/server-init.sh cleanup
      - name: Vulnerability Scan
        run: yarn audit
